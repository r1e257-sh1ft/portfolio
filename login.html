<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Login | IT Ops & Automation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #ffffff;
      --blue-main: #0A84FF;
      --blue-soft: #E6F0FF;
      --text-main: #1f2933;
      --text-sub: #6b7280;
    }

    body {
      font-family: "Noto Sans JP", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 1rem;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 2.2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 28px rgba(15,23,42,0.12);
      border: 1px solid #e5e7eb;
    }

    .login-title {
      font-family: "Montserrat", sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--blue-main);
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .login-sub {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-sub);
      margin-bottom: 2rem;
    }

    .input-box {
      margin-bottom: 1.2rem;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      border-radius: 0.6rem;
      border: 1px solid #d1d5db;
      font-size: 0.95rem;
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: var(--blue-main);
      color: #ffffff;
      border: none;
      border-radius: 0.6rem;
      font-size: 1rem;
      font-weight: 600;
      box-shadow: 0 6px 20px rgba(10,132,255,0.25);
      cursor: pointer;
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    .msg {
      margin-top: 1rem;
      text-align: center;
      color: red;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-title">Login</div>
    <div class="login-sub">認証後に限定ページへアクセスできます</div>

    <div class="input-box">
      <input id="password" type="password" placeholder="Password" />
    </div>

    <button class="btn-login" onclick="login()">ログイン</button>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    // ▼ shift257 の SHA-256 ハッシュ値
    const PASSWORD_HASH = "24b7b320c8c4b38c40cd66dc482ec2baf7cda6bf4e6f8efb1d801987f7c15147";

    async function login() {
      const pass = document.getElementById("password").value;

      // 入力されたパスワードをSHA-256でハッシュ化
      const encoder = new TextEncoder();
      const data = encoder.encode(pass);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

      // ハッシュ値が一致したらログイン成功
      if (hashHex === PASSWORD_HASH) {
        // ログイン状態を保存（直リンク防止用）
        localStorage.setItem("loggedIn", "true");
        
        window.location.href = "/portfolio/private/index.html";
      } else {
        document.getElementById("msg").textContent = "パスワードが違います";
      }
    }
  </script>
</body>
</html>
